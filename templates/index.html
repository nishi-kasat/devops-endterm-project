<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps-2 ET Project Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0px 5px 15px rgba(0,0,0,.15);
        }

        img{
            width:100%;
            border-radius:10px;
        }

        h1{
            font-weight:bold;
        }

        .table{
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container py-4">

    <h1 class="text-center mb-4">
        DevOps End Term Dashboard
    </h1>

    <div class="row mb-4">

        <div class="col-md-6">

            <div class="card p-4">

                <h3>Total Users</h3>

                <h1 class="text-primary">
                    {{ total_users }}
                </h1>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card p-4">

                <h3>Average Age</h3>

                <h1 class="text-success">
                    {{ average_age }}
                </h1>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="card p-3">

                <h4 class="text-center">
                    Age Distribution
                </h4>

                <img src="{{ url_for('static', filename='age_distribution.png') }}">

            </div>

        </div>

        <div class="col-md-6">

            <div class="card p-3">

                <h4 class="text-center">
                    Occupation Distribution
                </h4>

                <img src="{{ url_for('static', filename='occupation_distribution.png') }}">

            </div>

        </div>

    </div>

    <br>

    <div class="card p-3 mb-4">

        <h3>Occupation Summary</h3>

        {{ occupations|safe }}

    </div>

    <div class="card p-3">

        <h3>Sample Users (First 20)</h3>

        {{ users|safe }}

    </div>

</div>

</body>
</html>
